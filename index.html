<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

<!-- 🔐 TELA DE SENHA -->
<div id="passwordOverlay">
  <div class="password-card">
    <h2>nosso segredo</h2>
    <p class="password-sub">só você e eu sabemos</p>
    <input type="password" id="passwordInput" placeholder="digite a senha" autocomplete="off">
    <button id="submitPasswordBtn">entrar</button>
    <div id="passwordError"></div>
    <div class="ornament">✦ ✦ ✦</div>
  </div>
</div>

<!-- 🌸 TELA DE BOAS-VINDAS -->
<div id="welcomeOverlay" style="display: none;">
  <div class="welcome-card">
    <h1>Bianca</h1>
    <div class="sub-phrase">um lugar onde cada palavra<br>tem você dentro</div>
    <button class="enter-btn" id="enterBtn">ler algo para você</button>
    <div class="ornament">❀</div>
  </div>
</div>

<!-- 💌 APLICATIVO PRINCIPAL -->
<div id="app" style="display: none;">
  <header class="app-header">
    <h2>
      <span class="header-icon">✽</span>
      nosso cantinho
      <span class="header-icon">✽</span>
    </h2>
    <div class="header-right">
      <button class="theme-toggle-btn" id="themeToggleBtn" title="alternar modo">
        <span class="theme-icon">☀️</span>
      </button>
      <span id="cartasCount" class="count-badge">0</span>
      <button class="write-toggle-btn" id="toggleWriteBtn" disabled>
        <span class="btn-icon">✎</span> escrever
      </button>
    </div>
  </header>

  <!-- 🧭 ABAS -->
  <div class="tabs-container">
    <button class="tab-btn active" data-tab="bilhetes">Bilhetes</button>
    <button class="tab-btn" data-tab="cartas">Cartas</button>
  </div>

  <!-- Seção de escrita -->
  <section id="writeSection" style="display: none;">
    <div class="write-form">
      <label for="letterTitle">título (opcional)</label>
      <input type="text" id="letterTitle" placeholder="ex: manhã de domingo...">
      <label for="letterMessage">mensagem</label>
      <textarea id="letterMessage" placeholder="escreva aqui o que seu coração quiser dizer..."></textarea>
      <div class="form-actions">
        <button type="button" id="cancelWriteBtn" class="secondary-btn">cancelar</button>
        <button type="button" class="save-btn" id="saveLetterBtn">salvar</button>
      </div>
    </div>
  </section>

  <!-- VIEW BILHETES -->
  <div id="bilhetesView" class="view-container">
    <div id="bilhetesContainer" class="letters-feed">
      <div class="empty-message">carregando bilhetes...</div>
    </div>
  </div>

  <!-- VIEW CARTAS -->
  <div id="cartasView" class="view-container" style="display: none;">
    <div id="cartasListContainer" class="cartas-list">
      <div class="empty-message">carregando cartas...</div>
    </div>
  </div>

  <!-- MODAL DE DETALHE DA CARTA -->
  <div id="cartaModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <button class="modal-close" id="closeModalBtn">&times;</button>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-date" id="modalDate"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="modal-delete-btn" id="modalDeleteBtn">apagar</button>
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <div class="footer-line"></div>
    <span>cada linha é um pedacinho de nós</span>
    <div class="footer-line"></div>
  </footer>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
